name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Run Regression Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
      ZOHO_CLIENT_ID: "dummy"
      ZOHO_CLIENT_SECRET: "dummy"
      ZOHO_REFRESH_TOKEN: "dummy"
      ADMIN_PIN: "000000"
      JWT_SECRET: "ci-test-secret-not-for-production"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set Environment Variables
        run: |
          echo "DATABASE_URL=file:${{ github.workspace }}/ci.db" >> $GITHUB_ENV
          echo "ZOHO_CLIENT_ID=dummy" >> $GITHUB_ENV
          echo "ZOHO_CLIENT_SECRET=dummy" >> $GITHUB_ENV
          echo "ZOHO_REFRESH_TOKEN=dummy" >> $GITHUB_ENV

          # Also create .env file for tools that specifically look for it
          echo "DATABASE_URL=file:${{ github.workspace }}/ci.db" >> .env
          echo "ZOHO_CLIENT_ID=dummy" >> .env
          echo "ZOHO_CLIENT_SECRET=dummy" >> .env
          echo "ZOHO_REFRESH_TOKEN=dummy" >> .env
          echo "ADMIN_PIN=000000" >> .env
          echo "JWT_SECRET=ci-test-secret-not-for-production" >> .env

      - name: Debug Environment
        run: |
          echo "Files in directory:"
          ls -R
          echo "Content of .env:"
          cat .env
          echo "DATABASE_URL from env:"
          echo $DATABASE_URL

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Database Schema
        run: npx prisma db push

      - name: Build application
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: 🚀 Deploy to VPS
    # needs: test  # TODO: re-enable once Playwright tests are updated for cookie auth
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Starting deployment..."

            # Navigate to app directory
            cd /var/www/beds25

            # Ensure git safe.directory is set
            git config --global --add safe.directory /var/www/beds25 2>/dev/null || true

            # Pull latest changes
            echo "📥 Pulling latest code from GitHub..."
            git pull origin main

            # Install dependencies
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps

            # Generate Prisma client
            echo "🔧 Generating Prisma client..."
            npx prisma generate

            # Run database migrations
            echo "🗄️  Applying database migrations..."
            npx prisma db push --accept-data-loss

            # Set up persistent storage for image uploads
            echo "🔒 Securing persistent upload directories..."
            mkdir -p /var/www/beds25/.persistent-uploads
            mkdir -p /var/www/beds25/public
            ln -sfn /var/www/beds25/.persistent-uploads /var/www/beds25/public/uploads

            # Clean stale build artifacts (as root, no permission issues)
            echo "🧹 Cleaning stale build artifacts..."
            rm -rf .next

            # Fix ownership so beds25 user owns everything
            echo "🔑 Fixing file ownership..."
            chown -R beds25:beds25 /var/www/beds25

            # Build application as beds25 user
            echo "🏗️  Building application..."
            su - beds25 -c "cd /var/www/beds25 && npm run build"

            # Restart PM2 as beds25 user
            echo "♻️  Restarting application..."
            su - beds25 -c "pm2 restart beds25 || (fuser -k 3003/tcp 2>/dev/null; sleep 1; cd /var/www/beds25 && pm2 start node_modules/.bin/next --name beds25 -- start -p 3003)"

            # Save PM2 process list
            su - beds25 -c "pm2 save"

            echo "✅ Deployment complete!"
            echo "🌐 Application running on port 3003"
