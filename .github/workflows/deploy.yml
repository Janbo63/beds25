name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: beds25
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Starting deployment..."

            # Navigate to app directory
            cd /var/www/beds25

            # Ensure git safe.directory is set
            git config --global --add safe.directory /var/www/beds25 2>/dev/null || true

            # Pull latest changes
            echo "📥 Pulling latest code from GitHub..."
            git pull origin main

            # Install dependencies
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps

            # Generate Prisma client
            echo "🔧 Generating Prisma client..."
            npx prisma generate

            # Run database migrations
            echo "🗄️  Applying database migrations..."
            npx prisma db push --accept-data-loss

            # Set up persistent storage for image uploads
            echo "🔒 Securing persistent upload directories..."
            mkdir -p /var/www/beds25/.persistent-uploads
            mkdir -p /var/www/beds25/public
            ln -sfn /var/www/beds25/.persistent-uploads /var/www/beds25/public/uploads

            # Build application (no .next cleanup needed - Next.js handles incremental builds)
            echo "🏗️  Building application..."
            npm run build

            # Restart PM2 process
            echo "♻️  Restarting application..."
            pm2 restart beds25 || (fuser -k 3003/tcp 2>/dev/null; sleep 1; pm2 start node_modules/.bin/next --name beds25 -- start -p 3003)

            # Save PM2 process list
            pm2 save

            echo "✅ Deployment complete!"
            echo "🌐 Application running on port 3003"
